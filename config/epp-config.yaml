# llm-d Endpoint Picker config — file-based discovery, no Kubernetes.
# Taken from the official llm-d "no-kubernetes-deployment" guide
# (llm-d/llm-d: guides/no-kubernetes-deployment/router/epp/config.yaml).
#
# The file-discovery plugin replaces the Kubernetes InferencePool: the EPP
# reads its worker inventory from endpoints.yaml and (watchFile) live-reloads
# it on change. Scorers below implement KV-cache-aware routing:
#   queue-scorer                 — prefer shorter queues
#   kv-cache-utilization-scorer  — prefer emptier KV caches
#   prefix-cache-scorer          — prefer the instance whose cache already
#                                  holds this prompt's prefix
#   no-hit-lru-scorer            — spread cold prompts away from hot caches
apiVersion: llm-d.ai/v1alpha1
kind: EndpointPickerConfig

plugins:
  - name: file-discovery
    type: file-discovery
    parameters:
      path: /etc/llmd/endpoints.yaml  # EPP must have network access to all worker IPs for metrics scraping
      watchFile: true

  - type: queue-scorer
  - type: kv-cache-utilization-scorer
  - type: prefix-cache-scorer
  - type: no-hit-lru-scorer

  - name: metrics-source
    type: metrics-data-source
  - name: metrics-extractor
    type: core-metrics-extractor

schedulingProfiles:
  - name: default
    plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 3
      - pluginRef: no-hit-lru-scorer
        weight: 2

dataLayer:
  injectDefaults: false
  discovery:
    pluginRef: file-discovery
  sources:
    - pluginRef: metrics-source
      extractors:
        - pluginRef: metrics-extractor
